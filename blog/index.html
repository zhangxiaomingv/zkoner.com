<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博客 · zkoner</title>
  <meta name="description" content="zkoner 的 AI 实验室笔记 — GEO、自动化、增长系统">
  <link rel="canonical" href="https://zkoner.com/blog/">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #07070a; --bg-secondary: #0c0c14; --bg-card: #111120;
      --border: #1a1a30; --text-primary: #e2e2ea; --text-secondary: #7a7a90;
      --text-muted: #4a4a60; --accent: #00f0c0; --accent-dim: #00a080;
      --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
      --font-mono: "SF Mono", "Fira Code", "JetBrains Mono", monospace;
      --radius: 12px; --transition: 0.3s ease;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans); background: var(--bg-primary);
      color: var(--text-primary); line-height: 1.6; -webkit-font-smoothing: antialiased;
    }
    ::selection { background: var(--accent); color: var(--bg-primary); }
    a { color: var(--accent); text-decoration: none; }
    a:hover { opacity: 0.8; }
    .container { max-width: 720px; margin: 0 auto; padding: 0 24px; }

    /* Nav */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 0; border-bottom: 1px solid var(--border);
    }
    .logo { font-family: var(--font-mono); font-size: 0.9rem; font-weight: 500; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }
    .logo span { color: var(--text-muted); }
    .nav-links { display: flex; gap: 24px; list-style: none; }
    .nav-links a { color: var(--text-secondary); font-size: 0.82rem; font-family: var(--font-mono); transition: color var(--transition); }
    .nav-links a:hover { color: var(--accent); }

    /* Header */
    .page-header { padding: 60px 0 32px; }
    .page-header h1 { font-size: 2rem; font-weight: 600; margin-bottom: 8px; }
    .page-header p { color: var(--text-secondary); font-size: 0.9rem; }

    /* Empty state */
    .empty-state {
      padding: 80px 20px; text-align: center;
      border: 1px dashed var(--border); border-radius: var(--radius);
    }
    .empty-state .icon { font-size: 2.5rem; display: block; margin-bottom: 16px; }
    .empty-state p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.8; }
    .empty-state .tag { display: inline-block; background: var(--bg-card); color: var(--accent-dim); font-family: var(--font-mono); font-size: 0.7rem; padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); margin: 4px; }

    /* Post list (when posts exist) */
    .post-list { display: none; }
    .post-item { padding: 20px 0; border-bottom: 1px solid var(--border); }
    .post-item:first-child { border-top: 1px solid var(--border); }
    .post-item .date { font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; }
    .post-item .title { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; }
    .post-item .summary { font-size: 0.85rem; color: var(--text-secondary); }

    /* Footer */
    footer { border-top: 1px solid var(--border); padding: 32px 0 48px; margin-top: 60px; text-align: center; }
    footer p { font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-muted); }

    /* Post template */
    .post-template { display: none; }

    @media (max-width: 768px) {
      .nav-links { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a class="logo" href="/">zk<span>oner</span></a>
      <ul class="nav-links">
        <li><a href="/blog/">博客</a></li>
        <li><a href="/#faq">FAQ</a></li>
        <li><a href="/#philosophy">关于</a></li>
        <li><a href="/#contact">联系人</a></li>
      </ul>
    </nav>

    <div class="page-header">
      <h1>/ 博客</h1>
      <p>AI 实验室笔记 · 工作流实战 · 增长系统</p>
    </div>

    <div class="empty-state" id="emptyState">
      <span class="icon">⚡</span>
      <p>
        内容正在生产中...<br><br>
        这里将发布：
      </p>
      <div style="margin-top: 16px;">
        <span class="tag">GEO 实战</span>
        <span class="tag">n8n 工作流</span>
        <span class="tag">AI 自动化</span>
        <span class="tag">企业增长</span>
        <span class="tag">一人公司</span>
      </div>
      <p style="margin-top: 20px; font-size: 0.8rem;">
        <a href="https://github.com/zhangxiaomingv/zkoner-workflows">zkoner-workflows</a> · 内容由 n8n 自动管线生产
      </p>
    </div>

    <div class="post-list" id="postList"></div>

    <!-- 文章模板 (隐藏，n8n 自动填充) -->
    <template id="postTemplate">
      <div class="post-item">
        <div class="date"></div>
        <div class="title"><a href=""></a></div>
        <div class="summary"></div>
      </div>
    </template>
  </div>

  <footer>
    <div class="container">
      <p>© 2026 — zkoner · <a href="https://github.com/zhangxiaomingv/zkoner-workflows">GitHub</a> · <a href="/">首页</a></p>
    </div>
  </footer>

  <script>
    // 从 JSON 文件加载文章列表
    fetch('/blog/posts.json')
      .then(r => r.json())
      .then(posts => {
        if (posts && posts.length > 0) {
          document.getElementById('emptyState').style.display = 'none';
          const list = document.getElementById('postList');
          list.style.display = 'block';
          const tmpl = document.getElementById('postTemplate');
          posts.forEach(p => {
            const item = tmpl.content.cloneNode(true);
            item.querySelector('.date').textContent = p.date;
            item.querySelector('.title a').textContent = p.title;
            item.querySelector('.title a').href = p.url;
            item.querySelector('.summary').textContent = p.summary;
            list.appendChild(item);
          });
        }
      })
      .catch(() => {});
  </script>
</body>
</html>
